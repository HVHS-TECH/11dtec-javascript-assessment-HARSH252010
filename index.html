<!DOCTYPE html>
<html>
<head>

<title>Blank State</title>
<style>

    body{
        margin:0;
        font-family: Arial, sans-serif;
    }

.grid container{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:2px;
    background-color:#444;
}

.grid-container > div{
    background-color: #e6e6e6;
    border:1px solid black;
    display:flex;
    justify-content:center;
    align-items: center;
    font-weight:bold;
}

/* NAVBAR */

#navbar{
    grid-column:1/5;
    height:70px;
    background-color: black;
    color: white;
    
}

/* HERO BANNER */
    
#hero{
    grid-column:1/5;
    height:300px;

}

/* PRODUCTS */

#product1{
    grid-column:1/2;
    height:220px;
}

#product2{
    grid-column:2/3;
    height:220px;

}

#product3{
    grid-column:4/5;
    height:220px;

}
#product4{
    grid-column:4/5;
    height:220px;

}

/* SALE */

#sale{
    grid-column:1/5;
    height:120px;

}

/* ABOUT */

#about{
    grid-column:1/5;
    height:120px;
    
}

/* CONTACT */

#contact{
    grid-column:1/5;
    height:120px;

}

</style>
</head>
<body>

</body>

</div>

<div id="product">
    SNEAKERS
</div>

<div id="sale">
    WINTER SALE
</div>

<div id="about">
    ABOUT US
</div>

<div id="contact">
    CONTACT US
</div>
