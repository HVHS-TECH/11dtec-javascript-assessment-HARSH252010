<body>
<style>
  
.grid-container {
  background-color: #2c3e50;
  padding: 0;
  min-height: 100vh;
  display: grid;
   grid-template-columns:  1fr 1fr 1fr 1fr;
  gap: 2px;
    grid-template-rows: auto auto auto auto;
  /* display, grid-template-columns, gap */
}

    .grid-container > div {
  background-color: #ecf0f1;
  color: rgb(21, 22, 20);
  padding: 10px;
  text-align: center;

  display: flex;
  flex-direction: column; 
  justify-content: center; 
}

#box1{
  grid-column-start: 1;
   grid-column-end: 5;
   
   
   padding: 10px 20px; 
  
}
#box2{
grid-column-start: 1;
grid-column-end: 5;
padding: 20px;
}

#box3{
  grid-column-start: 1;
  grid-column-end: 5;
  height: 300px;
}
#box4{
  grid-column:1/2;
  grid-row:4;
  height: 240px;
  }

#box5{
  grid-column:2/3;
  grid-row:4;
  height: 240px;
}
#box6{
  grid-column:3/4;
  grid-row:4;
  height: 240px;
}
#box7{
  grid-column:4/5;
  grid-row:4;
  height: 240px;

}
