<!DOCTYPE html>

.grid-container > div{
    background-color: #d9e6f2;
    border:2px solid #666;
    display:flex;
    justify-content:center;
    align-items: center;
    font-weight:bold;
}

/* NAVBAR */

#navbar{
    grid-column: 1/5;
    height: 80px;
    background-color: black;
    color: white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 20px;
}

.logo{
    font-size:30px;
    letter-spacing:2px;
    font-weight:600;
}

.menu{
    display:flex;
    gap:30px;
}

.menu a{
    color:white;
    text-decoration:none;
}



/* HERO */
    
#hero{
    grid-column:1/5;
    height:370px;

}

#new{
    grid-column:1/5;
    height:80px;
}

/* PRODUCTS */

#product1{
    grid-column:1/2;
    height:500px;

}

 


#product2{
    grid-column:2/3;
    height:500px;

}

#product3{
    grid-column:3/4;
    height:500px;

}
#product4{
    grid-column:4/5;
    height:500px;

}

/* SALE */

    grid-column:1/5;
    height:280px;

}

/* ABOUT */

#about{
    grid-column:1/5;
    height:180px;
    
}

/* CONTACT */

#contact{
    grid-column:1/5;
    height:150px;
    flex-direction:column;
}


</style>
</head>

</div>
