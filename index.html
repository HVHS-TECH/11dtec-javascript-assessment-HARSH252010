<!DOCTYPE html>
<html>
<head>

<title>Blank State</title>
<style>

    body{
        margin:0;
        font-family: Arial, sans-serif;
    }

.grid-container{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap: 2px;
    background-color:#444;
    padding:5px;

}

.grid-container > div{
    background-color: #d9e6f2;
    border:2px solid #666;
    display:flex;
    justify-content:center;
    align-items: center;
    font-weight:bold;
}

/* NAVBAR */

#navbar{
    grid-column: 1/5;
    height: 80px;
    background-color: black;
    color: white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 20px;
}

.logo{
    font-size:30px;
    letter-spacing:2px;
    font-weight:600;
}

.menu{
    display:flex;
    gap:30px;
}

.menu a{
    color:white;
    text-decoration:none;
}



/* HERO */
    
#hero{
    grid-column:1/5;
    height:370px;

}

#new{
    grid-column:1/5;
    height:80px;
}

/* PRODUCTS */

#product1{
    grid-column:1/2;
    height:500px;

}

 
#product2{
    grid-column:2/3;
    height:500px;

}

#product3{
    grid-column:3/4;
    height:500px;
}





/* ABOUT */

#about{
    grid-column:1/5;
    height:150px;
    
}

/* CONTACT */

#contact{
    grid-column:1/5;
    height:150px;
    flex-direction:column;
}

#receipt{
    margin:20px;
    padding:15px;
    background-color:white;
    border:2px solid black;
}


</style>
</head>
<body>



    
<div class="grid-container">
  <div id= "navbar">

     <div class="logo">BLANK STATE</div>

     <div class="menu">

      <a href="#">Wishlist</a>

      <a href="#">
        Cart (<span id="cartcount">0</span>)
      </a>
      
    </div>
    
</div>
   

    <div id="hero">
        <img src="" alt="Blank state banner">
    </div>
    
    <div id="new">
        NEW MEN'S COLLECTION
    </div>


    <div id="product1">

        <h3>Essential Hoodie</h3>

        <img src="" alt="product1">
        
        <p>$80</p>

        <button onclick="addItem(0)">+</button>

        <span id="qty0">0</span>

        <button onclick="removeItem(0)">-</button>

    </div>
        

    

    <div id="product2">

        <h3>classic T-Shirt</h3>
        
        <img src="" alt="product2">

        <p>$45</p>

        <button onclick="addItem(1)">+</button>

        <span id="qty1">0</span>

        <button onclick="removeItem(1)">-</button>

    </div>

    <div id="product3">

        <h3>Slim Fit Jeans</h3>

        <img src="" alt="product3">

        <p>$70</p>

        <button onclick="addItem(2)">+</button>

        <span id="qty2">0</span>

        <button onclick="removeItem(2)">-</button>

    </div>

  

   

    <div id="about">
        Blank State is a New Zealand clothing brand focused on premium, comfortable streetwear for everyday wear.
    </div>

    <div id="contact">
  <h2>Contact</h2>
  <p>Email:24641h@hvhs.school.nz</p>
  <p>Phone: 1234567890</p>
  </div>

</div>



<button onclick="placeOrder()">Order Now</button>

<button onclick="resetOrder()">Reset</button>

<div id="receipt"></div>

<script>



    function resetOrder(){


    document.getElementById("receipt").innerHTML = "";
}

    let clothingItems = [
        "Essential Hoodie",
        "Classic T-Shirt",
        "Slim Fit Jeans",
      /*  "Urban Sneakers",
        "Formal Shirt",
        "Leather Jacket",
        "chelsea boots",
        "Perfume"*/

        ];

    let clothesprices = [
        80,
        45,
        70
    ];

    let quantities = [
        0,
        0,
        0
    ];
    
    function placeOrder(){

  

    let name = prompt("Enter your name:");

    if(name === null || name.trim() === "") {
        alert("please enter your name.");
        return;
    }
    
    let money = Number(
        prompt("How much money do you have?")
    );

    if(isNaN(money)){
        alert("please enter a valid amount.");
        return;
    }

    let total = 0;

    for(let i = 0; i <quantities.length; i++){

        total = total + (quantities[i] * clothesprices[i]);

    }
    
    

       
    let change = money - total;

    document.getElementById("receipt").innerHTML =
    "<h2>BLANK STATE</h2>" +
    "<hr>" +
    "<h3>Receipt</h3>" +
    "<p>Date: " + new Date().toLocaleDateString() + "</p>" +


    
    "<p><b>Customer:</b> " + name + "</p>" +
    "<p><b>Money Given:</b> $" + money + "</p>" +
    "<p><b>Change:</b> $" + change + "</p>";
    
    

function addItem(index){
    quantities[index]++;
    document.getElementById("qty" + index).innerHTML = quantities[index];

}

function removeItem(index){

    if(quantities[index] > 0){
        
        quantities[index]--;

        document.getElementById("qty" + index).innerHTML = quantities[index];

    }
}

</script>
</body>
</html>
