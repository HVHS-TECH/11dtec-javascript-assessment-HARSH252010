<!DOCTYPE html>
<html>
<head>

<title>Blank State</title>
<style>

    body{
        margin:0;
        font-family: Arial, sans-serif;
    }

.grid-container{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap: 2px;
    background-color:#444;
    padding:5px;

}

.grid-container > div{
    background-color: #d9e6f2;
    border:2px solid #666;
    display:flex;
    justify-content:center;
    align-items: center;
    font-weight:bold;
}

/* NAVBAR */

#navbar{
    grid-column: 1/5;
    height: 80px;
    background-color: black;
    color: white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 20px;
}

.logo{
    font-size:30px;
    letter-spacing:2px;
    font-weight:600;
}

.menu{
    display:flex;
    gap:30px;
}

.menu a{
    color:white;
    text-decoration:none;
}



/* HERO */
    
#hero{
    grid-column:1/5;
    height:370px;

}

#new{
    grid-column:1/5;
    height:80px;
}

/* PRODUCTS */

#product1{
    grid-column:1/2;
    height:500px;

}

 
#product2{
    grid-column:2/3;
    height:500px;

}

#product3{
    grid-column:3/4;
    height:500px;

}
#product4{
    grid-column:4/5;
    height:500px;

}

#product5{
    grid-column:1/2;
    height:500px;

}

/* ABOUT */

#about{
    grid-column:1/5;
    height:180px;
    
}

/* CONTACT */

#contact{
    grid-column:1/5;
    height:150px;
    flex-direction:column;
}

#receipt{
    margin:20px;
    padding:15px;
    background-color:white;
    border:2px solid black;
}


</style>
</head>
<body>



    
<div class="grid-container">
  <div id= "navbar">

     <div class="logo">BLANK STATE</div>

     <div class="menu">

      <a href="#">♡ Wishlist</a>

      <a href="#">
        🛒 Cart (<span id="cartcount">0</span>)
      </a>
      
    </div>
    
</div>
   

    <div id="hero">
        <img src="" alt="Blank state banner">
    </div>
    
    <div id="new">
        NEW MEN'S COLLECTION
    </div>


    <div id="product1">
        <img src="" alt="product1">
    </div>
        

    

    <div id="product2">
        <img src="" alt="product2">
    </div>

    <div id="product3">
        <img src="" alt="product3">
    </div>

    <div id="product4">
        <img src="" alt="product4">
    </div>


    <div> id="product5">
        <img src="" alt="product5">
    </div>
    

    <div id="about">
        About us
    </div>

    <div id="contact">
  <h2>Contact</h2>
  <p>Email:24641h@hvhs.school.nz</p>
  <p>Phone: 1234567890</p>
  </div>

</div>



<button onclick="placeOrder()">Order Now</button>

<button onclick="resetOrder()">Reset</button>

<div id="receipt"></div>

<script>



    function resetOrder(){


    document.getElementById("receipt").innerHTML = "";
}

    let clothingItems = [
        "Essential Hoodie",
        "Classic T-Shirt",
        "Slim Fit Jeans",
        "Urban Sneakers",
        "Formal Shirt",
        "Leather Jacket"

        ];

    let price = 50;
    
    function placeOrder(){

       let item = Number(prompt(
    "Choose an item:\n" +
    "1. Essential Hoodie\n" +
    "2. Classic T-shirt\n" +
    "3. Slim Fit Jeans\n" +
    "4. Urban Sneakers\n" +
    "5. Formal Shirt\n" +
    "6. Leather Jacket\n" 
    
));

if(item < 1 || item > 6){
    alert("Please choose a number between 1 and 5");
    return;
}
    let name = prompt("Enter your name:");
    
    let money = Number(
        prompt("How much money do you have?")
    );
    
    if(money < price){

        alert("you do not have enough money!");

        return;
    }

    let change = money - price;

    document.getElementById("receipt").innerHTML =
    "<h2>Receipt</h2>" +
    "<p> Name: " + name + "</p>" +
    "<p>Item: " + clothingItems[item-1] + "</p>" +
    "<p>Cost: $" + price + "</P>" +
    "<p>Money Given: $" + money + "</p>" +
    "<p>Change: $" + change + "</p>";
    
    }

    </script>
</body>
</html>
