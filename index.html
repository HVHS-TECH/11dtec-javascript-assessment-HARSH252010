<!DOCTYPE html>
<html>
<head>

<title>Blank State</title>
<style>

    body{
        margin:0;
        font-family: Arial, sans-serif;
    }

.grid-container{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr;
    gap:2px;
    background-color:#444;
}

.grid-container > div{
    background-color: #d9e6f2;
    border:2px solid #666;
    display:flex;
    justify-content:center;
    align-items: center;
    font-weight:bold;
}

/* NAVBAR */

#navbar{
    grid-column:1/5;
    height:70px;
    background-color: black;
    color: white;
    
}

/* HERO BANNER */
    
#hero{
    grid-column:1/5;
    height:300px;

}

#new{
    grid-column:1/5;
    height:80px;
}

/* PRODUCTS */

#product1{
    grid-column:1/2;
    height:220px;
}

#product2{
    grid-column:2/3;
    height:220px;

}

#product3{
    grid-column:3/4;
    height:220px;

}
#product4{
    grid-column:4/5;
    height:220px;

}

/* SALE */

#sale{
    grid-column:1/5;
    height:120px;

}

/* ABOUT */

#about{
    grid-column:1/5;
    height:120px;
    
}

/* CONTACT */

#contact{
    grid-column:1/5;
    height:120px;

}

</style>
</head>
<body>

<div class="grid-container">
 
    <div id="navbar">
        BLANK STATE | NEW | SEARCH | WHISLIST | CART
    </div>

    <div id="hero">
        HERO BANNER
    </div>
    
    <div id="new">
        NEW MEN'S COLLECTION
    </div>


    <div id="product1">
        HOODIE
    </div>

    <div id="product2">
        T-SHIRT
    </div>

    <div id="product3">
        JEANS
    </div>

    <div id="product4">
        SNEAKERS
    </div>

    <div id="sale">
        WINTER SALE
    </div>

    <div id="about">
        CONTACT
    </div>

    <div id="contact">
        CONTACT
    </div>

</div>
</body>
</html>
