    <div class="container">

        <h1>Your Wishlist</h1>

        <table>
        
        <tr>

        <th>Product</th>

        <th>Action</th>

        </tr>  
        
        <tbody id="wishlistTable">

        </tbody>

        </table>

        <br>

        <button onclick="clearWishlist()">
    Clear Wishlist
</button>

   <script>
   
   let wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

displayWishlist();

function displayWishlist(){
    let table = "";

    document.getElementById("wishlistTable").innerHTML = table;

}

function removeItem(index){

wishlist.splice(index,1);

localStorage.setItem(

"wishlist",

JSON.stringify(wishlist)

);

displayWishlist();

}

function clearWishlist(){

wishlist = [];

localStorage.setItem(

"wishlist",

JSON.stringify(wishlist)

);

displayWishlist();

}

for(let i=0;i<wishlist.length;i++){
    table +=

"<tr>" +

"<td>" + wishlist[i] + "</td>" +

"<td><button onclick='removeItem(" + i + ")'>Remove</button></td>" +

"</tr>";

}

if(wishlist.length==0){

table =

"<tr><td colspan='2'>Your wishlist is empty.</td></tr>";

}
    






let quantities =
JSON.parse(localStorage.getItem("quantities")) || [0,0,0];

</script>

</body>
