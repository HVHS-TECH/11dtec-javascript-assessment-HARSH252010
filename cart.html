<!DOCTYPE html>
<html>
<head>
<title>Blank State - Cart</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#444;
}

/* NAVBAR */

.navbar{
    background:black;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

.logo{
    font-size:30px;
    font-weight:bold;
    letter-spacing:2px;
}

/* CART */

.container{

    width:70%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0px 3px 10px gray;

}

h1{

    text-align:center;

}

table{

    width:100%;
    border-collapse:collapse;
    margin-top:20px;

}

th,td{

    border:1px solid #ccc;
    padding:12px;
    text-align:center;

}

button{

    width:180px;
    padding:12px;
    margin:15px 10px;
    background:black;
    color:white;
    border:none;
    cursor:pointer;

}

button:hover{

    background:#555;

}

#receipt{

    margin-top:30px;
    padding:20px;
    border:2px solid black;

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">
<a href="index.html">BLANK STATE</a>
</div>

<div>

<a href="index.html">Home</a>

<a href="wishlist.html">Wishlist</a>

</div>

</div>


<div class="container">

<h1>Your Shopping Cart</h1>

<table>

<tr>

<th>Product</th>

<th>Quantity</th>

<th>Price</th>

</tr>

<tbody id="cartTable">

</tbody>

</table>

<h2 id="totalPrice">Total: $0</h2>

<h2>Customer Details</h2>

<label>Name</label><br>
<input type="text" id="customerName"><br><br>

<label>Money Given ($)</label><br>
<input type="number" id="money"><br><br>

<button onclick="placeOrder()">Place Order</button>

<button onclick="resetOrder()">Reset</button>

<div id="receipt"></div>

<script>

let clothingItems=[
"Essential Hoodie",
"Classic T-Shirt",
"Slim Fit Jeans"
];

let clothesPrices=[
80,
45,
70
];

let quantities=JSON.parse(localStorage.getItem("quantities")) || [0,0,0];

displayCart();

function displayCart(){

let table="";

let total=0;

for(let i=0;i<clothingItems.length;i++){

if(quantities[i]>0){

table +=

"<tr>" +

"<td>"+clothingItems[i]+"</td>"+

"<td>"+quantities[i]+"</td>"+

"<td>$"+(quantities[i]*clothesPrices[i])+"</td>"+

"</tr>";

total += quantities[i]*clothesPrices[i];

}

}

if(table==""){

table="<tr><td colspan='3'>Your cart is empty.</td></tr>";

}

document.getElementById("cartTable").innerHTML=table;

document.getElementById("totalPrice").innerHTML="Total: $"+total;

}


function placeOrder(){

let total = 0;

for(let i = 0; i < quantities.length; i++){

    total += quantities[i] * clothesPrices[i];

}

if(total == 0){

    alert("Your cart is empty!");
    return;

}

let name = document.getElementById("customerName").value;

let money = Number(document.getElementById("money").value);

if(name == ""){

    alert("Please enter your name.");
    return;

}

if(money == "" || isNaN(money)){

    alert("Please enter the amount of money.");
    return;

}

if(money < total){

    alert("You do not have enough money.");
    return;

}

let change = money - total;

document.getElementById("receipt").innerHTML =

"<h2>Receipt</h2>" +

"<p><strong>Name:</strong> " + name + "</p>" +

"<p><strong>Items Purchased:</strong></p>" +

createReceiptItems() +

"<hr>" +

"<p><strong>Total Cost:</strong> $" + total + "</p>" +

"<p><strong>Money Given:</strong> $" + money + "</p>" +

"<p><strong>Change:</strong> $" + change + "</p>" +

"<h3>✅ Thank you for shopping at Blank State!</h3>";

quantities = [0,0,0];

localStorage.setItem("quantities", JSON.stringify(quantities));

displayCart();

}

function createReceiptItems(){

    let text = "<ul>";

    for(let i = 0; i < clothingItems.length; i++){

        if(quantities[i] > 0){

            text += "<li>" +
            clothingItems[i] +
            " x " +
            quantities[i] +
            "</li>";

        }

    }

    text += "</ul>";

    return text;

}


function resetOrder(){

    quantities = [0,0,0];

    localStorage.setItem("quantities", JSON.stringify(quantities));

    displayCart();

    document.getElementById("receipt").innerHTML = "";

    document.getElementById("customerName").value = "";

    document.getElementById("money").value = "";

}

</script>

</body>
</html>
