<!DOCTYPE html>
<html>
<head>
<title>Blank State - Cart</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#444;
}

/* NAVBAR */

.navbar{
    background:black;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

.logo{
    font-size:30px;
    font-weight:bold;
    letter-spacing:2px;
}

/* CART */

.container{

    width:70%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0px 3px 10px gray;

}

h1{

    text-align:center;

}

table{

    width:100%;
    border-collapse:collapse;
    margin-top:20px;

}

th,td{

    border:1px solid #ccc;
    padding:12px;
    text-align:center;

}

button{

    width:180px;
    padding:12px;
    margin:15px 10px;
    background:black;
    color:white;
    border:none;
    cursor:pointer;

}

button:hover{

    background:#555;

}

#receipt{

    margin-top:30px;
    padding:20px;
    border:2px solid black;

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">
<a href="index.html">BLANK STATE</a>
</div>

<div>

<a href="index.html">Home</a>

<a href="wishlist.html">Wishlist</a>

</div>

</div>


<div class="container">

<h1>Your Shopping Cart</h1>

<table>

<tr>

<th>Product</th>

<th>Quantity</th>

<th>Price</th>

</tr>

<tbody id="cartTable">

</tbody>

</table>

<h2 id="totalPrice">Total: $0</h2>

<div id="receipt"></div>

<button onclick="window.location.href='checkout.html'">
Go to Checkout
</button>

<button onclick="resetOrder()">Reset</button>

</div>

<script>

let clothingItems=[
"Essential Hoodie",
"Classic T-Shirt",
"Slim Fit Jeans"
];

let clothesPrices=[
80,
45,
70
];

let quantities=
JSON.parse(localStorage.getItem("quantities")) || [0,0,0];

displayCart();

function displayCart(){

let table="";

let total=0;

for(let i=0;i<clothingItems.length;i++){

if(quantities[i]>0){

table +=

"<tr>" +

"<td>"+clothingItems[i]+"</td>"+

"<td>"+quantities[i]+"</td>"+

"<td>$"+(quantities[i]*clothesPrices[i])+"</td>"+

"</tr>";

total += quantities[i]*clothesPrices[i];

}

}

if(table==""){

table="<tr><td colspan='3'>Your cart is empty.</td></tr>";

}

document.getElementById("cartTable").innerHTML=table;

document.getElementById("totalPrice").innerHTML="Total: $"+total;

}


function resetOrder(){

    quantities = [0,0,0];

    localStorage.setItem("quantities", JSON.stringify(quantities));

    document.getElementById("receipt").innerHTML = "";

    displayCart();

}

</script>

</body>
</html>
