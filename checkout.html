<!DOCTYPE html>
<html>
<head>

<title>Blank State - Checkout</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#444;
}

.navbar{
    background:black;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.logo a{
    color:white;
    text-decoration:none;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

.container{

    width:70%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0px 3px 10px gray;

}

table{

    width:100%;
    border-collapse:collapse;

}

th,td{

    border:1px solid #ccc;
    padding:12px;
    text-align:center;

}

button{

    background:black;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    margin-top:20px;

}

button:hover{

    background:#555;

}

#message{

    margin-top:25px;
    padding:20px;
    border:2px solid black;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">

<a href="index.html">BLANK STATE</a>

</div>

<div>

    <a href="index.html">Home</a>

<a href="cart.html">Cart</a>

<a href="wishlist.html">Wishlist</a>

</div>

</div>
<div class="container">

<h1>Checkout</h1>

<table>

<tr>

    <th>Product</th>

<th>Quantity</th>

<th>Price</th>

</tr>

<tbody id="checkoutTable">

</tbody>

</table>

<h2 id="totalPrice">Total: $0</h2>

<button onclick="completeOrder()">

Complete Purchase

</button>

<div id="message"></div>

</div>

<script>

    let clothingItems=[

"Essential Hoodie",

"Classic T-Shirt",

"Slim Fit Jeans"

];

let clothesPrices=[

80,

45,

70

];

let quantities=

JSON.parse(localStorage.getItem("quantities")) || [0,0,0];

displayCheckout();

function displayCheckout(){

let table="";

let total=0;

for(let i=0;i<clothingItems.length;i++){

if(quantities[i]>0){

table +=

"<tr>"+

    "<td>"+clothingItems[i]+"</td>"+

"<td>"+quantities[i]+"</td>"+

"<td>$"+(quantities[i]*clothesPrices[i])+"</td>"+

"</tr>";

total += quantities[i]*clothesPrices[i];

   }

}

if(table==""){

table="<tr><td colspan='3'>No items to checkout.</td></tr>";

}

document.getElementById("checkoutTable").innerHTML=table;

document.getElementById("totalPrice").innerHTML="Total: $"+total;

}

function completeOrder(){

let total=0;

for(let i=0;i<quantities.length;i++){

total += quantities[i]*clothesPrices[i];

}
